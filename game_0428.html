<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026/04/21 台灣華語小遊戲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');
        :root { --bg-color: #FFF0F5; --primary-pink: #FFB6C1; --hover-pink: #FF69B4; --selected-purple: #DDA0DD; --matched-purple: #9370DB; --text-color: #5D4037; --hp-green: #2ECC71; --hp-red: #E74C3C; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .top-nav { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .icon-btn { background: #fff; border: 2px solid var(--primary-pink); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--hover-pink); box-shadow: 0 4px 0px var(--primary-pink); cursor: pointer; transition: all 0.1s; text-decoration: none; }
        .icon-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px var(--primary-pink); }
        h1, h2 { color: var(--hover-pink); margin: 0; text-shadow: 2px 2px 0px #FFF; text-align: center; flex-grow: 1; }
        h1 { font-size: clamp(1.2rem, 4vw, 1.5rem); } h2 { font-size: clamp(1.2rem, 4vw, 1.5rem); color: var(--selected-purple); }
        
        .page { display: none; width: 100%; max-width: 600px; animation: fadeIn 0.4s; }
        .page.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        details { width: 100%; background: #fff; border-radius: 15px; border: 2px solid var(--primary-pink); margin-bottom: 20px; overflow: hidden; }
        summary { background: var(--primary-pink); color: #fff; padding: 12px 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; list-style: none; text-align: center; }
        .vocab-item { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px dashed var(--primary-pink); font-size: 1.1rem; font-weight: bold; color: var(--matched-purple); }

        .game-menu { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: #fff; border: 3px solid var(--primary-pink); padding: 15px 5px; font-size: 1.1rem; font-weight: bold; color: var(--hover-pink); border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0px var(--primary-pink); text-align: center; }
        .menu-btn:active { transform: translateY(5px); box-shadow: 0 0px 0px var(--primary-pink); }

        /* 動畫區塊 */
        .dog-header { font-size: 3rem; height: 70px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; position: relative; }
        .dog-head { transition: all 0.3s; }
        .dog-msg { position: absolute; top: -10px; right: 25%; background: #fff; border-radius: 10px; padding: 2px 8px; font-size: 1rem; opacity: 0; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .happy .dog-head { animation: jump 0.5s ease; } .happy .dog-msg { opacity: 1; color: orange; content: "✨"; }
        .sad .dog-head { animation: shake 0.5s ease; } .sad .dog-msg { opacity: 1; color: blue; content: "加油!"; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px) scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* 卡片與排版 */
        .card { background-color: var(--primary-pink); color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0px #FF94A8; font-size: clamp(1rem, 4vw, 1.3rem); padding: 12px 5px; text-align: center; white-space: nowrap; transition: all 0.2s; margin-bottom: 10px;}
        .card.selected { background-color: var(--selected-purple); box-shadow: 0 4px 0px #BA55D3; transform: scale(1.05); }
        .card.matched { background-color: var(--matched-purple); box-shadow: 0 2px 0px #4B0082; cursor: default; transform: translateY(2px); }

        .cols-board { width: 100%; display: flex; justify-content: space-between; gap: 10px; position: relative;}
        .col { flex: 1; display: flex; flex-direction: column; z-index: 10;}

        /* Game 2: 翻牌 */
        .memory-board { width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .memory-card { aspect-ratio: 3/4; perspective: 1000px; cursor: pointer; }
        .memory-card-inner { width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
        .memory-card.flipped .memory-card-inner, .memory-card.matched .memory-card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .front { background-color: var(--primary-pink); color: white; font-size: 1.5rem; }
        .back { background-color: #fff; color: var(--matched-purple); border: 2px solid var(--matched-purple); transform: rotateY(180deg); font-size: clamp(0.9rem, 3.5vw, 1.3rem); white-space: nowrap; text-align: center; padding: 2px;}
        .memory-card.matched .back { background-color: var(--matched-purple); color: #fff; }

        /* Game 3: 拖拉 */
        .g3-anim-zone { font-size: 4rem; text-align: center; margin-bottom: 10px; transition: transform 0.3s; height: 80px;}
        .draggable { touch-action: none; cursor: grab; position: relative; z-index: 10; background: #fff; color: var(--hover-pink); border: 3px solid var(--primary-pink); font-size: clamp(1rem, 4vw, 1.2rem);}
        .draggable.dragging { cursor: grabbing; background: var(--selected-purple); color: white; z-index: 9999 !important; box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .draggable.matched { background: var(--matched-purple); color: white; border-color: var(--matched-purple); cursor: default; touch-action: auto; z-index: 1 !important;}
        .dropzone { background: var(--primary-pink); color: white; font-weight: bold; border-radius: 12px; padding: 15px 5px; text-align: center; white-space: nowrap; font-size: clamp(1rem, 4vw, 1.2rem); margin-bottom: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); position: relative; z-index: 1;}
        .dropzone.matched { background: var(--matched-purple); }

        /* Game 4: 打怪 */
        .battle-arena { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .char-row { display: flex; justify-content: space-around; align-items: flex-end; padding: 10px; background: #fff; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);}
        .char-box { display: flex; flex-direction: column; align-items: center; width: 40%; }
        .sprite { font-size: 3.5rem; position: relative; margin-top: 10px; }
        .hp-container { width: 100%; background: #ddd; border-radius: 10px; height: 15px; border: 2px solid #fff; position: relative; overflow: hidden;}
        .hp-bar { height: 100%; background: var(--hp-green); transition: width 0.3s, background-color 0.3s; }
        .question-box { background: #fff; border: 3px dashed var(--hover-pink); border-radius: 15px; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--text-color); }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn { background: #fff; border: 2px solid var(--primary-pink); border-radius: 12px; padding: 15px; font-size: 1.2rem; font-weight: bold; color: var(--text-color); cursor: pointer; box-shadow: 0 4px 0px var(--primary-pink); transition: all 0.1s; }
        .opt-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px var(--primary-pink); background: var(--primary-pink); color: #fff; }
        @keyframes atkRight { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(40px) scale(1.1); } }
        @keyframes atkLeft { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-40px) scale(1.1); } }
        @keyframes hitEffect { 0%, 100% { filter: none; transform: translateX(0); } 25% { filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); transform: translateX(-5px); } 75% { filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <div class="top-nav">
            <a href="index.html" class="icon-btn">🏠</a>
            <h1 id="main-title">載入中...</h1>
            <div style="width: 45px;"></div>
        </div>

        <details>
            <summary>📝 點此展開本次生詞與注音</summary>
            <div id="vocab-list"></div>
        </details>

        <div class="game-menu">
            <button class="menu-btn" onclick="openGame(1)">🌸 1. 注音配對</button>
            <button class="menu-btn" onclick="openGame(2)">🧩 2. 翻牌配對</button>
            <button class="menu-btn" onclick="openGame(3)">🍖 3. 餵食小狗</button>
            <button class="menu-btn" onclick="openGame(4)">⚔️ 4. 答題打怪</button>
        </div>
    </div>

    <div id="game1-page" class="page">
        <div class="top-nav">
            <div class="icon-btn" onclick="showPage('menu-page')">⬅</div>
            <h2>注音配對</h2><div style="width: 45px;"></div>
        </div>
        <div class="dog-header" id="dog1"><div class="dog-head">🐶</div><div class="dog-msg" id="msg1"></div></div>
        <div class="cols-board"><div class="col" id="g1-zh"></div><div class="col" id="g1-zy"></div></div>
    </div>

    <div id="game2-page" class="page">
        <div class="top-nav">
            <div class="icon-btn" onclick="showPage('menu-page')">⬅</div>
            <h2>翻牌配對</h2><div style="width: 45px;"></div>
        </div>
        <div class="dog-header" id="dog2"><div class="dog-head">🐶</div><div class="dog-msg" id="msg2"></div></div>
        <div class="memory-board" id="g2-board"></div>
    </div>

    <div id="game3-page" class="page">
        <div class="top-nav">
            <div class="icon-btn" onclick="showPage('menu-page')">⬅</div>
            <h2>餵食小狗</h2><div style="width: 45px;"></div>
        </div>
        <div class="g3-anim-zone" id="g3-dog-anim">🐶</div>
        <div style="font-size: 0.9rem; color: #888; margin-bottom: 10px;">* 請拖拉左邊中文去蓋住正確的注音</div>
        <div class="cols-board"><div class="col" id="g3-zh"></div><div class="col" id="g3-zy"></div></div>
    </div>

    <div id="game4-page" class="page">
        <div class="top-nav">
            <div class="icon-btn" onclick="showPage('menu-page')">⬅</div>
            <h2>答題打怪</h2><div style="width: 45px;"></div>
        </div>
        <div class="battle-arena">
            <div class="char-row">
                <div class="char-box">
                    <div class="hp-container"><div class="hp-bar" id="dog-hp"></div></div>
                    <div class="sprite" id="b-dog">🐶</div>
                </div>
                <div style="font-size: 1.5rem; font-weight: bold; color: #ccc;">VS</div>
                <div class="char-box">
                    <div class="hp-container"><div class="hp-bar" id="mon-hp" style="background:var(--hp-red);"></div></div>
                    <div class="sprite" id="b-mon">👾</div>
                </div>
            </div>
            <div class="question-box" id="g4-q">載入中...</div>
            <div class="options-grid" id="g4-opts"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🌟 設定專屬資料 (若要新增日期，只需更改這裡！)
        // ==========================================
        const TARGET_DATE = "2026/04/28"; 
        const GOOGLE_SHEET_CSV_URL = "YOUR_GOOGLE_SHEET_CSV_URL_HERE"; 
        
        let currentVocabList = [];

        async function fetchDailyData() {
            try {
                let csvText = "";
                if(GOOGLE_SHEET_CSV_URL === "YOUR_GOOGLE_SHEET_CSV_URL_HERE") {
                    csvText = `日期,生詞,注音\n2026/04/21,學校,ㄒㄩㄝˊ ㄒㄧㄠˋ\n2026/04/21,作業,ㄗㄨㄛˋ ㄧㄝˋ\n2026/04/21,考試,ㄎㄠˇ ㄕˋ\n2026/04/21,老師,ㄌㄠˇ ㄕ\n2026/04/21,學生,ㄒㄩㄝˊ ㄕㄥ`;
                } else {
                    const res = await fetch(GOOGLE_SHEET_CSV_URL);
                    csvText = await res.text();
                }

                const rows = csvText.split('\n').map(row => row.trim()).filter(row => row);
                const headers = rows[0].split(',');
                const dateIdx = headers.indexOf('日期') > -1 ? headers.indexOf('日期') : 0;
                const zhIdx = headers.indexOf('生詞') > -1 ? headers.indexOf('生詞') : 1;
                const zyIdx = headers.indexOf('注音') > -1 ? headers.indexOf('注音') : 2;

                currentVocabList = [];
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length >= 3 && cols[dateIdx] === TARGET_DATE) {
                        currentVocabList.push({ zh: cols[zhIdx], zy: cols[zyIdx] });
                    }
                }

                document.getElementById('main-title').innerText = `${TARGET_DATE} 台灣華語小遊戲`;
                
                const listDiv = document.getElementById('vocab-list');
                listDiv.innerHTML = '';
                currentVocabList.forEach(v => {
                    listDiv.innerHTML += `<div class="vocab-item"><span>${v.zh}</span><span>${v.zy}</span></div>`;
                });

            } catch (error) {
                document.getElementById('main-title').innerText = "資料載入失敗";
            }
        }
        window.onload = fetchDailyData;

        // --- 共用系統 ---
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'fail') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.25);
            }
        }

        function showPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pageId).classList.add('active'); }
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        function dogReaction(num, state) {
            const dog = document.getElementById(`dog${num}`); const msg = document.getElementById(`msg${num}`);
            dog.className = 'dog-header'; void dog.offsetWidth;
            if(state === 'happy') { dog.classList.add('happy'); } else { dog.classList.add('sad'); }
        }

        function openGame(n) {
            initAudio(); showPage(`game${n}-page`);
            const activeVocab = shuffle([...currentVocabList]).slice(0, 5); 
            if(n===1) initGame1(activeVocab); if(n===2) initGame2(activeVocab);
            if(n===3) initGame3(activeVocab); if(n===4) initGame4(currentVocabList);
        }

        // ================== Game 1 ==================
        let g1SelZh = null, g1SelZy = null;
        function initGame1(vocabs) {
            g1SelZh = null; g1SelZy = null;
            const zhCol = document.getElementById('g1-zh'); const zyCol = document.getElementById('g1-zy');
            zhCol.innerHTML = ''; zyCol.innerHTML = '';
            shuffle([...vocabs]).forEach(v => { let btn = document.createElement('div'); btn.className = 'card'; btn.innerText = v.zh; btn.onclick = () => { if(btn.classList.contains('matched')) return; document.querySelectorAll('#g1-zh .card').forEach(c => c.classList.remove('selected')); btn.classList.add('selected'); g1SelZh = { el: btn, val: v.zh }; checkG1(); }; zhCol.appendChild(btn); });
            shuffle([...vocabs]).forEach(v => { let btn = document.createElement('div'); btn.className = 'card'; btn.innerText = v.zy; btn.onclick = () => { if(btn.classList.contains('matched')) return; document.querySelectorAll('#g1-zy .card').forEach(c => c.classList.remove('selected')); btn.classList.add('selected'); g1SelZy = { el: btn, val: v.zh }; checkG1(); }; zyCol.appendChild(btn); });
        }
        function checkG1() {
            if (g1SelZh && g1SelZy) {
                if (g1SelZh.val === g1SelZy.val) { playSound('success'); dogReaction(1, 'happy'); g1SelZh.el.classList.replace('selected', 'matched'); g1SelZy.el.classList.replace('selected', 'matched'); } 
                else { playSound('fail'); dogReaction(1, 'sad'); let tempZ = g1SelZh.el, tempY = g1SelZy.el; setTimeout(() => { tempZ.classList.remove('selected'); tempY.classList.remove('selected'); }, 400); }
                g1SelZh = null; g1SelZy = null;
            }
        }

        // ================== Game 2 (生詞Only) ==================
        let g2Flipped = [], g2Lock = false;
        function initGame2(vocabs) {
            g2Flipped = []; g2Lock = false;
            const board = document.getElementById('g2-board'); board.innerHTML = '';
            shuffle([...vocabs, ...vocabs]).forEach(v => {
                let card = document.createElement('div'); card.className = 'memory-card';
                // 只顯示生詞 v.zh
                card.innerHTML = `<div class="memory-card-inner"><div class="front">🌸</div><div class="back">${v.zh}</div></div>`;
                card.onclick = () => {
                    if (g2Lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                    card.classList.add('flipped'); g2Flipped.push({ el: card, val: v.zh });
                    if (g2Flipped.length === 2) {
                        g2Lock = true;
                        if (g2Flipped[0].val === g2Flipped[1].val) { playSound('success'); dogReaction(2, 'happy'); g2Flipped[0].el.classList.add('matched'); g2Flipped[1].el.classList.add('matched'); g2Flipped = []; g2Lock = false; } 
                        else { playSound('fail'); dogReaction(2, 'sad'); setTimeout(() => { g2Flipped[0].el.classList.remove('flipped'); g2Flipped[1].el.classList.remove('flipped'); g2Flipped = []; g2Lock = false; }, 800); }
                    }
                }; board.appendChild(card);
            });
        }

        // ================== Game 3 (圖層拖拉強化) ==================
        let dogScale = 1;
        function initGame3(vocabs) {
            dogScale = 1; const dogAnim = document.getElementById('g3-dog-anim'); dogAnim.style.transform = `scale(${dogScale})`; dogAnim.innerText = '🐶';
            const zhCol = document.getElementById('g3-zh'); const zyCol = document.getElementById('g3-zy'); zhCol.innerHTML = ''; zyCol.innerHTML = '';
            shuffle([...vocabs]).forEach(v => { let drop = document.createElement('div'); drop.className = 'dropzone'; drop.innerText = v.zy; drop.dataset.val = v.zh; zyCol.appendChild(drop); });
            shuffle([...vocabs]).forEach(v => {
                let drag = document.createElement('div'); drag.className = 'card draggable'; drag.innerText = v.zh; drag.dataset.val = v.zh;
                let startX=0, startY=0;
                drag.addEventListener('pointerdown', (e) => { 
                    if(drag.classList.contains('matched')) return; 
                    drag.setPointerCapture(e.pointerId); 
                    startX = e.clientX; startY = e.clientY; 
                    dogAnim.innerText = '🐶'; 
                    drag.classList.add('dragging'); // 提升圖層到最上層
                });
                drag.addEventListener('pointermove', (e) => { 
                    if(drag.classList.contains('matched') || !drag.hasPointerCapture(e.pointerId)) return; 
                    let dx = e.clientX - startX; let dy = e.clientY - startY; 
                    drag.style.transform = `translate(${dx}px, ${dy}px) scale(1.05)`; 
                });
                drag.addEventListener('pointerup', (e) => {
                    if(drag.classList.contains('matched') || !drag.hasPointerCapture(e.pointerId)) return; 
                    drag.releasePointerCapture(e.pointerId);
                    drag.classList.remove('dragging'); // 釋放最上層圖層
                    
                    drag.style.visibility = 'hidden'; let target = document.elementFromPoint(e.clientX, e.clientY); drag.style.visibility = 'visible';
                    let dropZone = target ? target.closest('.dropzone') : null;
                    if (dropZone && !dropZone.classList.contains('matched') && dropZone.dataset.val === drag.dataset.val) { 
                        playSound('success'); drag.classList.add('matched'); dropZone.classList.add('matched'); drag.style.transform = 'translate(0, 0)'; 
                        dogAnim.innerText = '🐶🍖'; setTimeout(() => { dogScale += 0.1; dogAnim.innerText = '🐕'; dogAnim.style.transform = `scale(${dogScale})`; }, 400); 
                    } 
                    else { playSound('fail'); drag.style.transition = 'transform 0.3s'; drag.style.transform = 'translate(0, 0)'; dogAnim.innerText = '😭'; setTimeout(() => drag.style.transition = '', 300); }
                }); zhCol.appendChild(drag);
            });
        }

        // ================== Game 4 (補血系統) ==================
        let hpDog = 100, hpMon = 100, qPool = [], activeVocabs = [];
        function initGame4(vocabs) {
            activeVocabs = vocabs; hpDog = 100; hpMon = 100; qPool = shuffle([...vocabs]); 
            document.getElementById('b-dog').innerText = '🐶'; document.getElementById('b-mon').innerText = '👾'; updateHP(); nextQ();
        }
        function updateHP() { 
            document.getElementById('dog-hp').style.width = hpDog + '%'; 
            document.getElementById('mon-hp').style.width = hpMon + '%'; 
            document.getElementById('dog-hp').style.background = hpDog > 30 ? 'var(--hp-green)' : 'var(--hp-red)'; 
        }
        function nextQ() {
            if (hpMon <= 0) { document.getElementById('b-mon').innerText = '💨'; document.getElementById('g4-q').innerText = '怪獸被打敗了！'; document.getElementById('g4-opts').innerHTML = `<button class="opt-btn" onclick="initGame4(activeVocabs)">再玩一次</button>`; playSound('success'); return; }
            if (hpDog <= 0) { document.getElementById('b-dog').innerText = '😵'; document.getElementById('g4-q').innerText = '小狗沒血了...'; document.getElementById('g4-opts').innerHTML = `<button class="opt-btn" onclick="initGame4(activeVocabs)">重新開始</button>`; playSound('fail'); return; }

            if (qPool.length === 0) qPool = shuffle([...activeVocabs]); // 確保每個詞都輪到
            const q = qPool.pop(); document.getElementById('g4-q').innerText = q.zh;
            
            let opts = [q.zy]; while(opts.length < 3) { let r = activeVocabs[Math.floor(Math.random() * activeVocabs.length)].zy; if(!opts.includes(r)) opts.push(r); }
            const optDiv = document.getElementById('g4-opts'); optDiv.innerHTML = '';
            shuffle(opts).forEach(o => {
                let b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => {
                    document.querySelectorAll('#g4-opts .opt-btn').forEach(btn => btn.disabled = true);
                    if(o === q.zy) { 
                        // 答對：狗攻擊，怪扣血，狗補血
                        document.getElementById('b-dog').style.animation = 'atkRight 0.3s ease'; 
                        setTimeout(() => { 
                            playSound('success'); document.getElementById('b-mon').style.animation = 'hitEffect 0.4s ease'; 
                            hpMon = Math.max(0, hpMon - 25);
                            hpDog = Math.min(100, hpDog + 10); // 小狗補血 10
                            updateHP(); 
                        }, 150); 
                    } 
                    else { 
                        // 答錯：怪反擊，狗扣血，怪補血
                        document.getElementById('b-mon').style.animation = 'atkLeft 0.3s ease'; 
                        setTimeout(() => { 
                            playSound('fail'); document.getElementById('b-dog').style.animation = 'hitEffect 0.4s ease'; 
                            hpDog = Math.max(0, hpDog - 34); 
                            hpMon = Math.min(100, hpMon + 10); // 怪獸補血 10
                            updateHP(); 
                        }, 150); 
                    }
                    setTimeout(() => { document.getElementById('b-dog').style.animation = ''; document.getElementById('b-mon').style.animation = ''; nextQ(); }, 1000);
                }; optDiv.appendChild(b);
            });
        }
    </script>
</body>
</html>
